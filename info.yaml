  title:        "circuito"    # Project title
  author:       "AngeL Pérez"      # Your name
  discord:      "xd"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "contador"      # One line description of what your project does
  language:     "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
